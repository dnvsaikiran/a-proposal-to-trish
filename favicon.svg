<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .path {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: dash 3s linear infinite;
    }
    @keyframes dash {
      to {
        stroke-dashoffset: 0;
      }
    }
    .heart {
      animation: beat 1s infinite alternate;
      transform-origin: center;
    }
    @keyframes beat {
      to { transform: scale(1.1); }
    }
  </style>
  <path class="path" d="M0,50 L20,50 L25,40 L35,60 L40,50 L50,50" fill="none" stroke="#D4AF37" stroke-width="3" />
  <path class="heart" d="M75,35 C70,30 60,30 55,35 L50,40 L45,35 C40,30 30,30 25,35 C20,40 20,50 25,55 L50,80 L75,55 C80,50 80,40 75,35 Z" fill="#D4AF37" />
</svg>